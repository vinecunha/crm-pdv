<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - PDV</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    .button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    .button:hover { background: #5a67d8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📴</div>
    <h1>Você está offline</h1>
    <p>Mas não se preocupe! O sistema continua funcionando e seus dados serão sincronizados quando a conexão voltar.</p>
    <button class="button" onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
